server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;

        # Local vision models (Ollama/oMLX) can take minutes on a cold load.
        # The backend allows 300s for the model call (see ai_vision.py), so the
        # gateway must wait at least that long — otherwise nginx returns a 504
        # while inference is still running. proxy_read_timeout sits slightly
        # above the backend's 300s so the backend, not nginx, owns the decision
        # to fail and can return a meaningful error instead of a bare 504.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 360s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
